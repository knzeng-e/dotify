app = "dotify-signal"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.signal"

[env]
  SIGNAL_PORT = "8788"
  SIGNAL_HOST = "0.0.0.0"
  SIGNAL_ROOM_TTL_MS = "21600000"
  SIGNAL_HOST_TIMEOUT_MS = "120000"
  SIGNAL_MAX_LISTENERS = "24"

[http_service]
  internal_port = 8788
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

