app = "dotify-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # These Paseo addresses predate the owner-only musicRegRegister fix. Do not
  # treat artist publication as production-safe until existing runtimes are
  # owner-upgraded, the factory/directory generation is replaced, and catalog
  # continuity through the cutover is verified.
  API_PORT = "8790"
  NODE_ENV = "production"
  PASEO_ASSET_HUB_RPC = "https://eth-rpc-testnet.polkadot.io/"
  DOTIFY_FACTORY_ADDRESS = "0x824ea33000e5e2ca9ddad030befa7331b38c41ce"
  DOTIFY_DIRECTORY_ADDRESS = "0x7f90d15b5ec5f3a668e4dc14def3fe1c876dde0c"
  DOTIFY_CHAIN_ID = "420420417"

[http_service]
  internal_port = 8790
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
