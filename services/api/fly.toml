app = "dotify-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # Fresh attested Paseo deployment. Keep aligned with deployments.json and
  # web/src/shared/config/deploymentSafety.ts so API diagnostics and access
  # checks target the owner-guarded factory/directory pair.
  API_PORT = "8790"
  NODE_ENV = "production"
  PASEO_ASSET_HUB_RPC = "https://eth-rpc-testnet.polkadot.io/"
  DOTIFY_FACTORY_ADDRESS = "0x9337287a194dfd8b53939eee1890b3f4ec0f8b0d"
  DOTIFY_DIRECTORY_ADDRESS = "0xda2761fea6f0871ed44ec719860fddb51b115be8"
  DOTIFY_CHAIN_ID = "420420417"

[http_service]
  internal_port = 8790
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
