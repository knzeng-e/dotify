name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-app
  cancel-in-progress: true

jobs:
  build:
    # GitHub Pages is optional for this repo. When Pages is not enabled,
    # actions/configure-pages fails the whole main CI run with "Get Pages site
    # failed". Set repository variable ENABLE_GITHUB_PAGES=true after enabling
    # Pages from GitHub Actions to turn this deployment back on.
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
