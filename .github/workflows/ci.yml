name: CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'contracts/evm/**'
      - 'deployments.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'contracts/evm/**'
      - 'deployments.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  web:
    name: Web build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  contracts:
    name: EVM contracts compile and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/evm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/evm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test
