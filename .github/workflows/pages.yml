name: Deploy documentation page

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy docs to GitHub Pages
    # GitHub Pages is optional for this repo. When Pages is not enabled,
    # actions/configure-pages fails the whole main CI run with "Get Pages site
    # failed". Set repository variable ENABLE_GITHUB_PAGES=true after enabling
    # Pages from GitHub Actions to turn this deployment back on.
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
